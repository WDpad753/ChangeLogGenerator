      Test_Project_Path: ChangeLogConsoleUnitTests\ChangeLogConsoleUnitTests.csproj                 # Replace with the path to your test project, i.e. MyWpfApp.Tests\MyWpfApp.Tests.csproj.
      Api_Project_Path: TestAPI\TestAPI.csproj
