    - name: Patch ProjectReference paths
      shell: pwsh
      run: tools/Patch-ProjectReferences.ps1

    # Add  MSBuild to the PATH: https://github.com/microsoft/setup-msbuild
    - name: Setup MSBuild.exe
      uses: microsoft/setup-msbuild@v2

    - name: Build API project
      shell: pwsh
      run: |
        dotnet build ${{ env.Api_Project_Path }} --configuration ${{ matrix.configuration }}

    - name: Start API in background
      shell: pwsh
      run: |
        $logPath = "apilog.txt"
        $projectPath = $env:Api_Project_Path
        $url = $env:HealthCheckUrl

        Write-Host "Launching pre-built API for health-check..."
        # Use a nested pwsh process to redirect both stdout and stderr into one file
        Start-Process -FilePath "pwsh" `
          -ArgumentList "-NoProfile", "-Command", "dotnet run --project `"$projectPath`" --urls=$url --no-build *> `"$PWD\$logPath`"" `
          -NoNewWindow -PassThru | Out-Null

        Write-Host "🚀 API process started on $url; logs => $logPath"

