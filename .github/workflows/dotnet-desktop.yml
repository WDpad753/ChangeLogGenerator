    - name: Wait for API listening and health-check
      shell: pwsh
      run: |
        $logPath = "apilog.txt"
        $url = $env:HealthCheckUrl  # e.g. "http://localhost:5237"

        # 1. Wait until "Now listening on" appears in the log (timeout ~60s)
        $timeoutListeningSec = 60
        $start = Get-Date
        while ((Get-Date) - $start).TotalSeconds -lt $timeoutListeningSec) {
            if (Test-Path $logPath) {
                if (Get-Content $logPath -Raw -ErrorAction SilentlyContinue | Select-String "Now listening on") {
                    Write-Host "Detected 'Now listening on' in logs."
                    break
                }
            }
            Write-Host "Waiting for 'Now listening on' in apilog.txt..."
            Start-Sleep -Seconds 2
        }
        if ((Get-Date) - $start).TotalSeconds -ge $timeoutListeningSec) {
            Write-Host "❌ Timeout waiting for listening log."
            Get-Content $logPath -ErrorAction SilentlyContinue
            exit 1
        }

        # 2. Poll /health until HTTP 200 (up to ~30s)
        $maxAttempts = 10
        for ($i = 0; $i -lt $maxAttempts; $i++) {
            try {
                $resp = Invoke-WebRequest -Uri "$url/health" -UseBasicParsing -TimeoutSec 3
                if ($resp.StatusCode -eq 200) {
                    Write-Host "✅ API is healthy"
                    break
                } else {
                    Write-Host "Unexpected status code $($resp.StatusCode)."
                }
            } catch {
                Write-Host "⏳ Waiting for API health (attempt $i)..."
            }
            Start-Sleep -Seconds 3
        }
        if ($i -eq $maxAttempts) {
            Write-Host "❌ API failed health-check. Dumping logs..."
            Get-Content $logPath
            exit 1
        }

    - name: Run tests
      run: dotnet test ${{ env.Test_Project_Path }} --configuration ${{ matrix.configuration }} --no-build --verbosity normal
      #env:
